name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
  VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env file from GitHub secrets
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Run unit tests
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug — check VERCEL_TOKEN availability
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "⚠️ VERCEL_TOKEN secret is EMPTY or MISSING"
          else
            echo "✅ VERCEL_TOKEN secret is set (length: ${#token})"
          fi

      - name: Pull Vercel environment info
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="${{ env.VERCEL_TEAM_ID }}"

      - name: Build project artifacts
        run: |
          vercel build \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prebuilt \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployment ready!**\n\nVisit: ${{ steps.deploy.outputs.url }}`
            })